# Default heap size for Gradle daemon is 1g or 2g.
# Increasing it to 4g to avoid OutOfMemoryError during dexing.
org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8

# Use AndroidX for better dependency management
android.useAndroidX=true

# Enable parallel execution and build caching for better performance
org.gradle.parallel=true
org.gradle.caching=true
